<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛳ Golfová Mapa ČR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        #map {
            height: 100%;
            width: 100%;
        }
        
        .controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 1000;
            max-width: 320px;
            font-size: 14px;
        }
        
        .controls h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
        }
        
        .search-box {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 10px;
        }
        
        .filter-buttons {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        
        .filter-btn {
            padding: 6px 10px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn.active {
            background: #1976D2;
            color: white;
            border-color: #1976D2;
        }
        
        .stats {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        
        .stat-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        
        .info-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 20px;
            border-top: 1px solid #ddd;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
            z-index: 500;
            max-height: 45vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.3s;
        }
        
        .info-panel.active {
            transform: translateY(0);
        }
        
        .info-panel h2 {
            font-size: 22px;
            color: #1976D2;
            margin-bottom: 10px;
        }
        
        .info-line {
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .info-label {
            font-weight: 600;
            color: #666;
        }
        
        .web-button {
            display: inline-block;
            background: #1976D2;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 13px;
            margin-top: 10px;
            cursor: pointer;
            border: none;
        }
        
        .web-button:hover {
            background: #1565C0;
        }
        
        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .legend {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: white;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 1000;
            font-size: 12px;
        }
        
        .legend-item {
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #333;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div class="controls">
        <h3>🔍 Vyhledávání</h3>
        <input type="text" class="search-box" id="searchInput" placeholder="Hledej hřiště...">
        
        <h3 style="margin-top: 15px;">Filtr</h3>
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">Všechna</button>
            <button class="filter-btn" data-filter="played">Odehraná</button>
            <button class="filter-btn" data-filter="unplayed">Neodehraná</button>
        </div>
        
        <div class="stats">
            <div class="stat-line">
                <span>Celkem:</span>
                <strong id="totalCourses">0</strong>
            </div>
            <div class="stat-line">
                <span>🔵 Odehraných:</span>
                <strong id="playedCourses" style="color: #1976D2;">0</strong>
            </div>
            <div class="stat-line">
                <span>🔴 Neodehraných:</span>
                <strong id="unplayedCourses" style="color: #E91E63;">0</strong>
            </div>
        </div>
    </div>
    
    <div class="legend">
        <div class="legend-item">
            <div class="legend-color" style="background: #1976D2;"></div>
            <span>Odehráno (modrá)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #E91E63;"></div>
            <span>Neodehráno (růžová)</span>
        </div>
    </div>
    
    <div class="info-panel" id="infoPanel">
        <button class="close-btn" onclick="closeInfo()">✕</button>
        <h2 id="courseName">-</h2>
        <div class="info-line"><span class="info-label">Jamek:</span> <span id="courseHoles">-</span></div>
        <div class="info-line"><span class="info-label">Kraj:</span> <span id="courseRegion">-</span></div>
        <div class="info-line"><span class="info-label">Lokace:</span> <span id="courseLocation">-</span></div>
        <div class="info-line"><span class="info-label">Web:</span> <a id="courseWebLink" href="#" target="_blank" style="color: #1976D2; text-decoration: underline;">-</a></div>
        <button class="web-button" id="courseWebBtn" onclick="openWeb()">🌐 Navštívit web</button>
        <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee;">
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" id="playedCheckbox" onchange="togglePlayed()" style="width: 18px; height: 18px;">
                <span>✓ Odehráno (změní na modrou)</span>
            </label>
        </div>
    </div>

 "region": "Jihlavský", "location": "J – Jihlava", "lat": 49.337778, "lng": 15.653611, "web": "https://www.golf-jihlava.cz"}, {"id": 121, "name": "Třímany", "holes": 18, "region": "Středočeský", "location": "S – Třímany", "lat": 49.94, "lng": 13.6075, "web": "https://example.com"}];

        const playedCourses = new Set();
        
        const map = L.map('map').setView([49.8, 15.4], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let markers = {};
        let currentCourse = null;
        let currentFilter = 'all';
        
        function init() {
            const saved = localStorage.getItem('playedCourses');
            if (saved) {
                saved.split(',').forEach(id => playedCourses.add(parseInt(id)));
            }
            
            addMarkers();
            updateStats();
            
            document.getElementById('searchInput').addEventListener('input', filterCourses);
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.dataset.filter;
                    updateMarkers();
                });
            });
        }

        function getColor(courseId) {
            return playedCourses.has(courseId) ? '#1976D2' : '#E91E63';
        }

        function addMarkers() {
            golfData.forEach(course => {
                const marker = L.circleMarker([course.lat, course.lng], {
                    radius: 8,
                    color: '#333',
                    weight: 2,
                    fill: true,
                    fillOpacity: 0.8,
                    fillColor: getColor(course.id)
                }).addTo(map);
                
                marker.on('click', () => showCourseInfo(course));
                markers[course.id] = marker;
            });
            updateMarkers();
        }

        function updateMarkers() {
            golfData.forEach(course => {
                const marker = markers[course.id];
                if (!marker) return;

                let visible = true;
                const fillColor = getColor(course.id);

                if (currentFilter === 'played') visible = playedCourses.has(course.id);
                if (currentFilter === 'unplayed') visible = !playedCourses.has(course.id);

                marker.setStyle({ fillColor });
                marker.setOpacity(visible ? 1 : 0.2);
            });
        }

        function showCourseInfo(course) {
            currentCourse = course;
            const isPlayed = playedCourses.has(course.id);
            
            document.getElementById('courseName').textContent = course.name;
            document.getElementById('courseHoles').textContent = course.holes + ' jamek';
            document.getElementById('courseRegion').textContent = course.region;
            document.getElementById('courseLocation').textContent = course.location;
            document.getElementById('courseWebLink').textContent = course.web;
            document.getElementById('courseWebLink').href = course.web;
            document.getElementById('courseWebBtn').href = course.web;
            document.getElementById('playedCheckbox').checked = isPlayed;
            document.getElementById('infoPanel').classList.add('active');
        }

        function closeInfo() {
            document.getElementById('infoPanel').classList.remove('active');
        }

        function togglePlayed() {
            if (!currentCourse) return;
            
            const isChecked = document.getElementById('playedCheckbox').checked;
            if (isChecked) {
                playedCourses.add(currentCourse.id);
            } else {
                playedCourses.delete(currentCourse.id);
            }
            
            localStorage.setItem('playedCourses', Array.from(playedCourses).join(','));
            
            const marker = markers[currentCourse.id];
            if (marker) {
                marker.setStyle({ fillColor: getColor(currentCourse.id) });
            }
            
            updateStats();
        }

        function openWeb() {
            if (currentCourse) window.open(currentCourse.web, '_blank');
        }

        function filterCourses(e) {
            const searchTerm = e.target.value.toLowerCase();
            golfData.forEach(course => {
                const marker = markers[course.id];
                const matches = course.name.toLowerCase().includes(searchTerm) || course.location.toLowerCase().includes(searchTerm);
                marker.setOpacity((searchTerm && !matches) ? 0.1 : 1);
                if (matches && searchTerm) map.setView([course.lat, course.lng], 12);
            });
        }

        function updateStats() {
            const played = playedCourses.size;
            const unplayed = golfData.length - played;
            document.getElementById('totalCourses').textContent = golfData.length;
            document.getElementById('playedCourses').textContent = played;
            document.getElementById('unplayedCourses').textContent = unplayed;
        }

        init();
    </script>
